<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Create Event &bull; DBDCompNet AP</title><link rel="stylesheet" href="../../../../styles.css"></head>
<body><div class="page"><header class="site-header"><div class="container nav"><a class="brand" href="../"><img class="brand-logo" src="../../../../assets/logo.png" alt="DBDCompNet logo"></a><nav class="nav-links nav-desktop"><a href="../../access/">Access</a><a href="../../teams/">Teams</a><a href="../../tournaments/">Tournaments</a><a href="../../news/">News</a><a href="../../settings/">Settings</a><a href="../../../../" class="btn btn-primary nav-cta">Leave AP</a></nav></div></header>
<main class="site-main"><section class="section"><div class="container narrow"><div class="section-head"><h1 class="section-title" style="margin:0;">Create Event</h1><a class="btn btn-secondary" href="../">Back</a></div>
<form class="ap-card ap-card--wide ap-form-grid" action="#" method="get">
  <label class="ap-field"><span>Tournament Name</span><input class="ap-input" placeholder="Tournament Name"></label>
  <label class="ap-field"><span>Type of Event</span><select class="ap-select"><option>1v1</option><option>4v1</option></select></label>
  <label class="ap-field"><span>Maximum Players / Users</span><input class="ap-input" type="number" min="2" placeholder="Minimum 2"></label>
  <label class="ap-field"><span>Maximum Teams</span><input class="ap-input" type="number" min="2" placeholder="Minimum 2"></label>
  <label class="ap-field"><span>Region Settings</span><select class="ap-select"><option>NA</option><option>EU</option><option>US</option><option>OCE</option><option>Global (All)</option></select></label>
  <label class="ap-field"><span>Format</span><select class="ap-select"><option>BO1</option><option>BO3</option><option>BO5</option><option>BO7</option><option>BO9</option></select></label>
  <label class="ap-field"><span>Tournament start date</span><input class="ap-input" type="date"></label>
  <label class="ap-field"><span>Deadline for Registrations date</span><input class="ap-input" type="date"></label>
  <label class="ap-field"><span>Playability</span><select class="ap-select"><option>Public</option><option>Invite-Only</option></select></label>
  <div class="ap-field ap-field--full"><p class="ap-note">Organizations can choose registered teams for invite-only events. Captains are informed by email.</p></div>
  <button class="btn btn-primary" type="button">Create</button>
</form></div></section></main></div></body></html>
