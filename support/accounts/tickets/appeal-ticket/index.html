<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Appeal Ticket &bull; DBDCompNet</title><link rel="stylesheet" href="../../../../styles.css"></head>
<body><div class="page"><main class="site-main"><section class="section"><div class="container narrow"><div class="section-head"><h1 class="section-title" style="margin:0;">Appeal Ticket</h1><a class="btn btn-secondary" href="../">Back to Tickets</a></div><form class="card forum-form" action="#" method="get"><p class="muted">Write down the ban / suspend reason and apology or message. Appeal tickets cannot be answered by users or deleted. They are answered by email with the final decision and automatically closed upon decision.</p><div class="forum-field"><label>Ban / Suspension Reason</label><input class="ap-input" placeholder="Reason shown to you"></div><div class="forum-field"><label>Appeal Message (maximum 500 characters)</label><textarea class="ap-textarea" maxlength="500" placeholder="Explain the suspension/ban and why you are appealing."></textarea></div><div class="forum-field"><label>Account UUID or Username</label><input class="ap-input" placeholder="UUID-OF-USER or username"></div><button class="btn btn-primary" type="button">Submit Appeal Ticket</button></form></div></section></main></div></body></html>
