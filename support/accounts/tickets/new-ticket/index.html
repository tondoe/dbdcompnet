<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Open Ticket &bull; DBDCompNet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../../styles.css" />
</head>
<body><div class="page"><main class="site-main"><section class="section"><div class="container narrow">
  <div class="section-head"><h1 class="section-title" style="margin:0;">Open Ticket</h1><a class="btn btn-secondary" href="../">Back to Tickets</a></div>
  <form class="card forum-form" action="#" method="post" style="margin-top:28px;">
    <div class="forum-field"><label for="ticket-category">Ticket Category</label><select id="ticket-category"><option>General Request</option><option>Report</option><option>Rating Systems Objection</option><option>Account Inquiry</option></select></div>
    <div class="forum-field"><label for="ticket-message">Message (maximum 500 characters)</label><textarea id="ticket-message" maxlength="500" class="ap-textarea" placeholder="Write your request here."></textarea></div>
    <button class="btn btn-primary" type="button">Submit Ticket</button>
  </form>
</div></section></main></div></body></html>
