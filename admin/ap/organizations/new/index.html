<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Create Organization &bull; DBDCompNet AP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../../styles.css" />
</head>
<body><div class="page"><main class="site-main"><section class="section"><div class="container narrow">
  <div class="section-head"><h1 class="section-title" style="margin:0;">Create Organization</h1><a class="btn btn-secondary" href="../">Back to Organizations</a></div>
  <form class="card forum-form" action="#" method="post" style="margin-top:28px;">
    <div class="forum-field"><label for="org-name">Full Organization Name</label><input class="ap-input" id="org-name" placeholder="Full organization name"></div>
    <div class="forum-field"><label for="org-email">Email Address</label><input class="ap-input" id="org-email" type="email" placeholder="service@dbdcompnet.com"></div>
    <div class="forum-field"><label for="org-shortcut">Org Shortcut (max. 6 letters)</label><input class="ap-input" id="org-shortcut" maxlength="6" placeholder="DBDCN"></div>
    <div class="forum-field"><label for="discord-server">Discord Server ID</label><input class="ap-input" id="discord-server" placeholder="001111111111111111"></div>
    <div class="forum-field"><label for="org-logo">Add Logo</label><input class="ap-input" id="org-logo" type="file"></div>
    <p class="muted">Terms are the Terms of Service for Admins. The system creates a one-time 12 character password that must be changed.</p>
    <button class="btn btn-primary" type="button">Create Org</button>
  </form>
</div></section></main></div></body></html>
